name: Build Android APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Flet
        run: pip install flet

      - name: Build APK
        run: flet build apk --project SaveUp

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: saveup-apk
          path: build/apk/*.apk